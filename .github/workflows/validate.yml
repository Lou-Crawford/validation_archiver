name: Validate Archiver (Rust)
on: [push]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tool
        run: cargo build --verbose

      - name: Run Unit Tests
        run: cargo test --verbose
